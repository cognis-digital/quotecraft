apiVersion: apps/v1
kind: Deployment
metadata: { name: quotecraft, labels: { app: quotecraft } }
spec:
  replicas: 1
  selector: { matchLabels: { app: quotecraft } }
  template:
    metadata: { labels: { app: quotecraft } }
    spec:
      containers:
        - name: quotecraft
          image: ghcr.io/cognis-digital/quotecraft:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: quotecraft }
spec:
  selector: { app: quotecraft }
  ports: [{ port: 80, targetPort: 8000 }]
